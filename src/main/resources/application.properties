# ===============================
# APPLICATION
# ===============================
spring.application.name=password-manager

# ===============================
# SERVER
# ===============================
server.port=0
server.error.include-message=always
server.error.include-binding-errors=always
server.error.whitelabel.enabled=false

# ===============================
# DATASOURCE - MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/password_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Optional: usually Hibernate can detect dialect automatically
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=never

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false

# ===============================
# STATIC RESOURCES
# ===============================
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.passwordmanager=DEBUG

# ===============================
# CUSTOM APP SETTINGS
# ===============================
app.encryption.secret=MyStrongSecret1
app.password.min-length=8
app.password.default-length=12

# ===============================
# MAIL
# ===============================
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your-email@example.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=your-email@example.com

# Session and security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict
app.verification.expiry-minutes=60
