<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Entry | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Add New Credential</h4>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/vault}" th:object="${entry}" method="post" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="title">Title</label>
                        <input id="title" th:field="*{title}" class="form-control" placeholder="Gmail">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="websiteUrl">Website URL</label>
                        <input id="websiteUrl" th:field="*{websiteUrl}" class="form-control"
                               placeholder="https://mail.google.com">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="username">Username / Email</label>
                        <input id="username" th:field="*{username}" class="form-control"
                               placeholder="you@example.com">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="categoryId">Category</label>
                        <select id="categoryId" th:field="*{categoryId}" class="form-select">
                            <option th:value="${null}">None</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group">
                            <input id="password" th:field="*{password}" type="password" class="form-control"
                                   data-password-strength="entry-strength"
                                   data-strength-hints="entry-strength-hints"
                                   autocomplete="new-password">
                            <button type="button" class="btn btn-outline-secondary"
                                    title="Show or hide password"
                                    data-toggle-password="password">Show</button>
                            <button type="button" class="btn btn-outline-primary"
                                    title="Generate strong password"
                                    data-generate-password="password">Generate</button>
                        </div>
                        <div class="password-strength mt-2" id="entry-strength">
                            <div class="password-strength-bar"></div>
                        </div>
                        <div id="entry-strength-hints" class="strength-hints">Add a strong, unique password.</div>
                        <div class="keyboard-warning" data-caps-warning>Caps Lock is on.</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="notes">Notes</label>
                        <textarea id="notes" th:field="*{notes}" class="form-control"
                                  rows="3" placeholder="Any extra information"></textarea>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{favorite}" id="favorite">
                            <label class="form-check-label" for="favorite">Mark as favorite</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Entry</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
