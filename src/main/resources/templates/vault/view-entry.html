<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'View ' + ${entry.title} + ' | Password Manager'">View Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0" th:text="${entry.title}">Gmail</h4>
        <div>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary me-2">Back</a>
            <a th:href="@{|/vault/${entry.id}/edit|}" class="btn btn-primary">Edit</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="text-muted">Website</label>
                    <p>
                        <a th:if="${entry.websiteUrl != null}"
                           th:href="${entry.websiteUrl}"
                           target="_blank" rel="noopener noreferrer"
                           th:text="${entry.websiteUrl}">https://example.com</a>
                        <span th:if="${entry.websiteUrl == null}" class="text-muted">Not set</span>
                    </p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted">Username</label>
                    <p>
                        <span th:text="${entry.username}">user@example.com</span>
                        <button type="button" class="icon-btn ms-2"
                                title="Copy username"
                                th:attr="data-copy-value=${entry.username}">Copy</button>
                    </p>
                </div>

                <div class="col-md-8">
                    <label class="text-muted d-block mb-2">Password</label>
                    <div class="input-group">
                        <input id="view-password" type="password" class="form-control"
                               th:value="${entry.password}" readonly>
                        <button type="button"
                                class="btn btn-outline-secondary"
                                data-toggle-password="view-password">Show</button>
                        <button type="button"
                                class="btn btn-outline-primary"
                                data-copy-target="view-password">Copy</button>
                    </div>
                    <div class="mt-2 d-flex flex-wrap gap-2">
                        <span class="health-badge"
                              th:classappend="${entry.passwordStrengthLabel == 'Strong'} ? ' health-strong' : (${entry.passwordStrengthLabel == 'Medium'} ? ' health-medium' : ' health-weak')"
                              th:text="${entry.passwordStrengthLabel}">Strong</span>
                        <span th:if="${entry.passwordReused}" class="health-badge health-reused">Reused password</span>
                        <span th:if="${entry.passwordOld}" class="health-badge health-old">Old password</span>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="text-muted">Favorite</label>
                    <p>
                        <span th:if="${entry.favorite}" class="badge bg-warning text-dark">Favorite</span>
                        <span th:if="${!entry.favorite}" class="text-muted">No</span>
                    </p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted">Category</label>
                    <p>
                        <span th:if="${entry.categoryName != null}" class="badge bg-secondary"
                              th:text="${entry.categoryName}">Social</span>
                        <span th:if="${entry.categoryName == null}" class="text-muted">None</span>
                    </p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted">Updated At</label>
                    <p th:text="${#temporals.format(entry.updatedAt, 'dd-MM-yyyy HH:mm')}">18-04-2026 00:00</p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted">Usage</label>
                    <p th:text="${entry.accessCount != null ? entry.accessCount + ' views' : 'Not viewed yet'}">0 views</p>
                </div>

                <div class="col-12">
                    <label class="text-muted">Notes</label>
                    <p th:text="${entry.notes != null and !#strings.isEmpty(entry.notes) ? entry.notes : 'No notes available'}">
                        No notes available
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
