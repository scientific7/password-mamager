<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="card card-auth shadow-sm">
        <div class="card-body">
            <h4 class="card-title text-center mb-3">Create your account</h4>
            <p class="text-center text-muted mb-4">Start a private vault for your passwords</p>

            <form th:action="@{/register}" th:object="${user}" method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="fullName">Full name</label>
                    <input id="fullName" th:field="*{fullName}" class="form-control" autofocus>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" th:field="*{email}" type="email" class="form-control">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" th:field="*{password}" type="password" class="form-control">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirmPassword">Confirm password</label>
                    <input id="confirmPassword" th:field="*{confirmPassword}" type="password" class="form-control">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Create account</button>
            </form>

            <p class="mt-3 mb-0 text-center">
                Already registered?
                <a th:href="@{/login}">Sign in</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
