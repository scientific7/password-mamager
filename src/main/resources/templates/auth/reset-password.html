<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="card card-auth auth-card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/forgot-password}" class="back-link">||| Back to recovery</a>
                <span class="badge bg-secondary">Reset password</span>
            </div>
            <div class="auth-banner">
                <h4 class="card-title auth-title mb-2">Reset your password</h4>
                <p class="auth-note mb-0">Set a new password using the recovery token from your link.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}" />
                <div class="mb-3">
                    <label for="password" class="form-label">New password</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="New password" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save new password</button>
            </form>

            <p class="mt-3 text-center text-muted">The recovery link expires in 30 minutes. After reset, sign in with your new password.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
