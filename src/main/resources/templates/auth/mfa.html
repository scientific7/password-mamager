<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="card card-auth auth-card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/login}" class="back-link">||| Back to login</a>
                <span class="badge bg-secondary">Step 2 of 2</span>
            </div>
            <div class="auth-banner mb-4">
                <h4 class="card-title auth-title mb-1 text-center">Verify sign in</h4>
                <p class="auth-note mb-0 text-center">Enter the 6-digit code from your authenticator app.</p>
            </div>
            <p class="text-center text-muted mb-4">
                Enter the 6-digit code from your authenticator app.
            </p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}">Invalid code.</div>

            <form th:action="@{/mfa}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="code">Verification code</label>
                    <input id="code" name="code" class="form-control otp-input"
                           inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                           placeholder="123456" required autofocus>
                </div>

                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <form th:action="@{/logout}" method="post" class="mt-3 text-center">
                <button type="submit" class="icon-btn">Use another account</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
