<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="card card-auth auth-card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/login}" class="back-link">||| Back to login</a>
                <span class="badge bg-secondary">Account recovery</span>
            </div>
            <div class="auth-banner">
                <h4 class="card-title auth-title mb-2">Forgot your password?</h4>
                <p class="auth-note mb-0">Enter the email linked to your account and follow the recovery instructions.</p>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Account email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100">Request recovery link</button>
            </form>

            <p class="mt-3 text-center text-muted">The recovery link expires in 30 minutes. Check your inbox for the next steps.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
