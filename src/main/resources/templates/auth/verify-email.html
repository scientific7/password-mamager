<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="card card-auth auth-card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/login}" class="back-link">||| Back to login</a>
                <span class="badge bg-secondary">Email verification</span>
            </div>
            <div class="auth-banner">
                <h4 class="card-title auth-title mb-2">Verify your email</h4>
                <p class="auth-note mb-0">Complete verification to unlock account access and MFA protection.</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <p class="mt-3 text-center text-muted">If your verification link has expired, register again or contact support.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
