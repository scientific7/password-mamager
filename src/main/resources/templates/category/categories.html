<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between mb-3">
        <h4 class="mb-0">Categories</h4>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Existing categories</h5>
                    <div th:if="${#lists.isEmpty(categories)}" class="text-muted">
                        No categories yet.
                    </div>
                    <ul class="list-group" th:if="${!#lists.isEmpty(categories)}">
                        <li class="list-group-item d-flex justify-content-between align-items-center"
                            th:each="cat : ${categories}">
                            <span th:text="${cat.name}">Social</span>
                            <span class="badge rounded-pill bg-secondary"
                                  th:text="${cat.color} ?: 'default'">default</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Add category</h5>
                    <form th:action="@{/categories}" th:object="${category}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="name">Name</label>
                            <input id="name" th:field="*{name}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="color">Color (optional)</label>
                            <input id="color" th:field="*{color}" class="form-control" placeholder="e.g. blue">
                        </div>
                        <button type="submit" class="btn btn-primary">Add category</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
