<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Generator | Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Password Generator</h4>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm generator-card">
                <div class="card-body">
                    <form th:action="@{/generator}" th:object="${generator}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="length">Password Length</label>
                            <input id="length" type="number" th:field="*{length}" class="form-control" min="12" max="64">
                        </div>

                        <div class="form-check mb-2">
                            <input id="includeUppercase" class="form-check-input" type="checkbox" th:field="*{includeUppercase}">
                            <label class="form-check-label" for="includeUppercase">Include Uppercase</label>
                        </div>

                        <div class="form-check mb-2">
                            <input id="includeLowercase" class="form-check-input" type="checkbox" th:field="*{includeLowercase}">
                            <label class="form-check-label" for="includeLowercase">Include Lowercase</label>
                        </div>

                        <div class="form-check mb-2">
                            <input id="includeNumbers" class="form-check-input" type="checkbox" th:field="*{includeNumbers}">
                            <label class="form-check-label" for="includeNumbers">Include Numbers</label>
                        </div>

                        <div class="form-check mb-3">
                            <input id="includeSpecialCharacters" class="form-check-input" type="checkbox" th:field="*{includeSpecialCharacters}">
                            <label class="form-check-label" for="includeSpecialCharacters">Include Special Characters</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Generate Password</button>
                            <button type="button" class="btn btn-outline-secondary"
                                    data-generate-password="generatedPassword"
                                    data-generator-options>Quick Generate</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm generator-card">
                <div class="card-body">
                    <h5 class="card-title mb-3">Generated Password</h5>

                    <div class="input-group">
                        <input id="generatedPassword" type="text" class="form-control"
                               data-password-strength="generated-strength"
                               data-strength-hints="generated-strength-hints"
                               th:value="${generatedPassword != null ? generatedPassword : ''}"
                               placeholder="Your generated password will appear here" readonly>
                        <button type="button" class="btn btn-outline-primary"
                                data-copy-target="generatedPassword">Copy</button>
                    </div>
                    <div class="password-strength mt-3" id="generated-strength">
                        <div class="password-strength-bar"></div>
                    </div>
                    <div id="generated-strength-hints" class="strength-hints">Generate a password to see its strength.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
